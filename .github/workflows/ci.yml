name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-apk:
    name: Build debug APK (smoke)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      # A debug build is enough to catch Gradle / Android-manifest / NDK /
      # resource regressions on every push without the cost of a signed release.
      - name: Build debug APK
        run: flutter build apk --debug

  relay:
    name: Relay (analyze & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get
      - run: dart analyze
      - run: dart test

