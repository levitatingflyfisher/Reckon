name: reckonparty_relay
description: >-
  Optional, self-hostable, content-agnostic sync relay for ReckonParty. Stores
  and returns opaque encrypted blobs keyed by party/ballot id — it never sees or
  interprets decision content. Run it anywhere with `dart run bin/server.dart`.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  shelf: ^1.4.1
  shelf_router: ^1.1.4

dev_dependencies:
  http: ^1.2.0
  lints: ^4.0.0
  test: ^1.25.0
